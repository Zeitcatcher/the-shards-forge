name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Stamp version from tag into module.json
        run: node tools/stamp-version.mjs
      - name: Build compendium packs
        run: npm run build
      - name: Package module.zip
        run: zip -r module.zip module.json packs assets README.md LICENSE
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
